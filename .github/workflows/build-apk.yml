name: Build Haya Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.9'

      - name: Build Debug APK
        run: gradle assembleDebug
        working-directory: android

      - name: Rename APK Output
        run: mv android/app/build/outputs/apk/debug/app-debug.apk android/app/build/outputs/apk/debug/HayaVoice.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Haya-Voice-APK
          path: android/app/build/outputs/apk/debug/HayaVoice.apk
