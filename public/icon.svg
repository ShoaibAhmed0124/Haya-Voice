<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0b0f19" />
      <stop offset="100%" stop-color="#020203" />
    </radialGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="50%" stop-color="#ec4899" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
    <filter id="neon" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Dark background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)" />
  <rect width="504" height="504" x="4" y="4" rx="108" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="8" />

  <!-- Neon Glowing Core -->
  <g transform="translate(256, 256)" filter="url(#neon)">
    <!-- Butterfly wings made of voice waves -->
    <!-- Left Wing -->
    <path d="M -10,-40 C -80,-120 -180,-80 -140,20 C -120,60 -60,80 -10,30" fill="none" stroke="url(#glow)" stroke-width="14" stroke-linecap="round" opacity="0.95" />
    <path d="M -10,-20 C -60,-80 -130,-50 -100,20 C -85,50 -45,60 -10,20" fill="none" stroke="url(#glow)" stroke-width="8" stroke-linecap="round" opacity="0.8" />
    
    <!-- Right Wing -->
    <path d="M 10,-40 C 80,-120 180,-80 140,20 C 120,60 60,80 10,30" fill="none" stroke="url(#glow)" stroke-width="14" stroke-linecap="round" opacity="0.95" />
    <path d="M 10,-20 C 60,-80 130,-50 100,20 C 85,50 45,60 10,20" fill="none" stroke="url(#glow)" stroke-width="8" stroke-linecap="round" opacity="0.8" />
    
    <!-- Antennae / Signal beams -->
    <path d="M -5,-50 C -15,-90 -40,-110 -60,-105" fill="none" stroke="#22d3ee" stroke-width="6" stroke-linecap="round" />
    <circle cx="-60" cy="-105" r="8" fill="#22d3ee" />
    
    <path d="M 5,-50 C 15,-90 40,-110 60,-105" fill="none" stroke="#ec4899" stroke-width="6" stroke-linecap="round" />
    <circle cx="60" cy="-105" r="8" fill="#ec4899" />
    
    <!-- Center Soundwave Body -->
    <line x1="0" y1="-70" x2="0" y2="70" stroke="url(#glow)" stroke-width="16" stroke-linecap="round" />
    <line x1="-20" y1="-30" x2="-20" y2="30" stroke="#22d3ee" stroke-width="10" stroke-linecap="round" />
    <line x1="20" y1="-30" x2="20" y2="30" stroke="#ec4899" stroke-width="10" stroke-linecap="round" />
    
    <!-- Micro pulsing dots -->
    <circle cx="0" cy="0" r="6" fill="#ffffff" />
  </g>
</svg>
