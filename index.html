<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Android Viewport Optimization: Prevents unwanted zooming on double-tap and fits notches/safe areas -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Remix: Haya Voice Assistant</title>
    
    <!-- Android Native Web App Capable -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#020203" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    
    <!-- iOS support as fallback -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="/icon.svg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for(let registration of registrations) {
            registration.unregister();
            console.log('Unregistered active service worker to bypass cache.');
          }
        });
        if (window.caches) {
          caches.keys().then(function(names) {
            for (let name of names) {
              caches.delete(name);
              console.log('Cleared cache:', name);
            }
          });
        }
      }
    </script>
  </body>
</html>
